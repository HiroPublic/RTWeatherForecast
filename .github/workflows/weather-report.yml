name: Generate Weather Report

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      WEATHER_INPUT_CSV: ${{ vars.WEATHER_INPUT_CSV || './examples/itinerary.sample.csv' }}
      WEATHER_OUTPUT_DIR: ${{ vars.WEATHER_OUTPUT_DIR || './output' }}
      WEATHER_CACHE_DIR: ${{ vars.WEATHER_CACHE_DIR || './.cache' }}
      WEATHER_LOW_TEMP_THRESHOLD: ${{ vars.WEATHER_LOW_TEMP_THRESHOLD || '14' }}
      WEATHER_HIGH_TEMP_THRESHOLD: ${{ vars.WEATHER_HIGH_TEMP_THRESHOLD || '28' }}
      WEATHER_GEOCODE_LANGUAGE: ${{ vars.WEATHER_GEOCODE_LANGUAGE || 'ja' }}
      WEATHER_SLACK_WEBHOOK_URL: ${{ secrets.WEATHER_SLACK_WEBHOOK_URL }}
      WEATHER_NOTION_TOKEN: ${{ secrets.WEATHER_NOTION_TOKEN }}
      WEATHER_NOTION_PARENT_PAGE_ID: ${{ secrets.WEATHER_NOTION_PARENT_PAGE_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Generate weather report
        run: |
          mkdir -p "$WEATHER_OUTPUT_DIR" "$WEATHER_CACHE_DIR"
          PYTHONPATH=src python -m weather_update.cli \
            --input "$WEATHER_INPUT_CSV" \
            --output-dir "$WEATHER_OUTPUT_DIR"

      - name: Upload generated artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weather-report
          path: ${{ env.WEATHER_OUTPUT_DIR }}/
